<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <title>Kayıt Defteri</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background-color: #f0f2f5;
        color: #333;
        min-height: 100vh;
      }

      #root {
        min-height: 100vh;
      }

      /* Header */
      .app-header {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
        color: #fff;
        padding: 1.5rem 2rem;
        text-align: center;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      }

      .app-header h1 {
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .app-header p {
        margin-top: 0.3rem;
        font-size: 0.9rem;
        opacity: 0.75;
      }

      /* Layout */
      .app-container {
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem 1.5rem 3rem;
      }

      /* Error banner */
      .error-banner {
        background: #fee2e2;
        border: 1px solid #fca5a5;
        color: #991b1b;
        border-radius: 8px;
        padding: 0.9rem 1.2rem;
        margin-bottom: 1.5rem;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      /* Form card */
      .form-card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 1.8rem;
        margin-bottom: 2rem;
        box-shadow: 0 2px 8px rgba(15, 52, 96, 0.08);
      }

      .form-card h2 {
        font-size: 1.1rem;
        font-weight: 600;
        color: #1a1a2e;
        margin-bottom: 1.2rem;
        padding-bottom: 0.75rem;
        border-bottom: 2px solid #e8edf4;
      }

      .form-group {
        margin-bottom: 1.1rem;
      }

      .form-group label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        color: #4a5568;
        margin-bottom: 0.4rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .form-group input,
      .form-group textarea {
        width: 100%;
        padding: 0.65rem 0.9rem;
        border: 1.5px solid #cbd5e0;
        border-radius: 7px;
        font-size: 0.95rem;
        font-family: inherit;
        color: #1a202c;
        background: #f8fafc;
        transition: border-color 0.15s, box-shadow 0.15s;
        outline: none;
        resize: vertical;
      }

      .form-group input:focus,
      .form-group textarea:focus {
        border-color: #0f3460;
        background: #fff;
        box-shadow: 0 0 0 3px rgba(15, 52, 96, 0.12);
      }

      .form-group textarea {
        min-height: 110px;
      }

      .char-count {
        font-size: 0.75rem;
        color: #94a3b8;
        text-align: right;
        margin-top: 0.3rem;
      }

      .char-count.near-limit {
        color: #d97706;
      }

      .char-count.at-limit {
        color: #dc2626;
      }

      .submit-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: linear-gradient(135deg, #0f3460, #16213e);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 0.7rem 1.8rem;
        font-size: 0.95rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: opacity 0.15s, transform 0.1s;
        margin-top: 0.5rem;
      }

      .submit-btn:hover:not(:disabled) {
        opacity: 0.9;
        transform: translateY(-1px);
      }

      .submit-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .form-error {
        background: #fee2e2;
        border: 1px solid #fca5a5;
        color: #991b1b;
        border-radius: 7px;
        padding: 0.65rem 1rem;
        font-size: 0.85rem;
        margin-top: 0.8rem;
      }

      /* Spinner */
      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255,255,255,0.4);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        display: inline-block;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Records section */
      .records-section h2 {
        font-size: 1.1rem;
        font-weight: 600;
        color: #1a1a2e;
        margin-bottom: 1rem;
        padding-bottom: 0.75rem;
        border-bottom: 2px solid #e8edf4;
      }

      /* Skeleton loading */
      .skeleton-card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        padding: 1.2rem 1.4rem;
        margin-bottom: 1rem;
        box-shadow: 0 1px 4px rgba(15, 52, 96, 0.06);
      }

      .skeleton-line {
        background: linear-gradient(90deg, #e2e8f0 25%, #f0f4f8 50%, #e2e8f0 75%);
        background-size: 200% 100%;
        animation: shimmer 1.2s infinite;
        border-radius: 4px;
        height: 14px;
        margin-bottom: 0.6rem;
      }

      .skeleton-line.short { width: 40%; }
      .skeleton-line.medium { width: 70%; }
      .skeleton-line.long { width: 90%; }

      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      /* Empty state */
      .empty-state {
        text-align: center;
        padding: 3rem 1rem;
        color: #94a3b8;
      }

      .empty-state-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
        opacity: 0.5;
      }

      .empty-state p {
        font-size: 1rem;
      }

      /* Record card */
      .record-card {
        background: #fff;
        border: 1px solid #dce6f0;
        border-left: 4px solid #0f3460;
        border-radius: 10px;
        padding: 1.2rem 1.4rem;
        margin-bottom: 1rem;
        box-shadow: 0 2px 6px rgba(15, 52, 96, 0.07);
        transition: box-shadow 0.15s, transform 0.1s;
      }

      .record-card:hover {
        box-shadow: 0 4px 14px rgba(15, 52, 96, 0.13);
        transform: translateY(-1px);
      }

      .record-title {
        font-size: 1rem;
        font-weight: 700;
        color: #1a1a2e;
        margin-bottom: 0.5rem;
        word-break: break-word;
      }

      .record-content {
        font-size: 0.92rem;
        color: #4a5568;
        line-height: 1.6;
        margin-bottom: 0.75rem;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .record-meta {
        font-size: 0.75rem;
        color: #94a3b8;
        display: flex;
        align-items: center;
        gap: 0.3rem;
      }

      /* Responsive */
      @media (max-width: 600px) {
        .app-header h1 {
          font-size: 1.5rem;
        }

        .app-container {
          padding: 1.2rem 1rem 2rem;
        }

        .form-card {
          padding: 1.2rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
